services:
  test-database:
    image: postgres:18-alpine
    ports:
      - 127.0.0.1:5434:5432
    environment:
      - POSTGRES_DB=test
      - POSTGRES_PASSWORD=password
      - POSTGRES_PORT=5434
      - POSTGRES_USER=user
    profiles:
      - test

  dev-database:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - 127.0.0.1:5433:5432
    shm_size: 128mb
    volumes:
      - dev_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      - POSTGRES_DB=dev
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=user
      - POSTGRES_PORT=5433
    profiles:
      - dev

  database:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - 127.0.0.1:5432:5432
    shm_size: 128mb
    volumes:
      - prod_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      - POSTGRES_DB=$PGDATABASE
      - POSTGRES_PASSWORD=$PGPASSWORD
      - POSTGRES_USER=$PGUSER
    networks:
      - mk_network
    profiles:
      - prod

  server:
    image: ghcr.io/bstempelj/memory-kana:0.3.0
    restart: unless-stopped
    ports:
      - 127.0.0.1:1234:1234
    environment:
      - CSRF_AUTH_KEY=$CSRF_AUTH_KEY
      - HOST_ENV=prod
      - PGDATABASE
      - PGHOST=postgres
      - PGPASSWORD
      - PGSSLMODE=disable
      - PGUSER
    depends_on:
      - database
    networks:
      - mk_network
    profiles:
      - prod

networks:
  mk_network:
    driver: bridge

volumes:
  dev_data:
  prod_data:
